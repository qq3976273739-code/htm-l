<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>虎天寿发卡网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            /* 这里是你的壁纸链接 */
            background: url("https://i.imgur.com/23C9uNm.jpeg") center/cover no-repeat fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: "Microsoft Yahei", sans-serif;
            text-shadow: 0 0 10px #000;
        }
        .title {
            font-size: 36px;
            margin-bottom: 30px;
        }
        .qrcode {
            width: 220px;
            height: 220px;
            border-radius: 12px;
            border: 4px solid #fff;
            margin-bottom: 30px;
        }
        .product {
            margin: 15px 0;
            text-align: center;
        }
        .product p {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .product button {
            padding: 10px 25px;
            background: #00a1ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="title">四叶草</div>
    <img class="qrcode" src="https://i.imgur.com/E6WlpW2.png" alt="收款码">
    <div class="product">
        <p>普通卡密 · 5 元</p>
        <button>立即购买</button>
    </div>
    <div class="product">
        <p>高级卡密 · 15 元</p>
        <button>立即购买</button>
    </div>
</body>
</html>
