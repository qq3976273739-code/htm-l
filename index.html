<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>虎天寿发卡</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:微软雅黑,sans-serif;
}
html,body{
    height:100%;
    width:100%;
}
body{
    background:url("https://s41.ax1x.com/2026/03/30/pe8kyA1.jpg") no-repeat center center !important;
    background-size:cover !important;
    background-attachment:fixed !important;
    color:#fff;
}
.top-name{
    position:fixed;
    top:20px;
    left:30px;
    font-size:28px;
    font-weight:bold;
    text-shadow:0 0 10px #000;
}
.container{
    max-width:800px;
    margin:100px auto;
    padding:0 20px;
}
.box{
    background:rgba(0,0,0,0.7);
    padding:30px;
    border-radius:16px;
    margin-bottom:20px;
}
.btn{
    background:#2d8cf0;
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}
.pay,.code{
    display:none;
    margin-top:15px;
}
.code{
    background:#111;
    color:#0f0;
    padding:15px;
    border-radius:8px;
    font-size:16px;
}
.pay-img{
    max-width:220px;
    border-radius:10px;
    margin-top:10px;
}
h1{
    text-align:center;
    margin-bottom:30px;
}
h3{
    margin-bottom:10px;
}
p{
    margin-bottom:10px;
}
</style>
</head>
<body>

<div class="top-name">虎天寿发卡</div>
<div class="container">
    <h1>卡密发卡</h1>

    <div class="box">
        <h3>社区小时体验卡</h3>
        <p>价格：3元</p >
        <button class="btn" onclick="showPay(1)">立即购买</button>
        <div class="pay" id="pay1">
            <p>请扫码支付 3元</p >
            <img src="https://i.cetsteam.com/imgs/2026/03/31/c0bc592857fd8edd.png" class="pay-img">
            <br>
            <button class="btn" onclick="getCode(1)">已支付，获取卡密</button>
        </div>
        <div class="code" id="code1"></div>
    </div>

    <div class="box">
        <h3>社区天卡</h3>
        <p>价格：10元</p >
        <button class="btn" onclick="showPay(2)">立即购买</button>
        <div class="pay" id="pay2">
            <p>请扫码支付 5元</p >
            <img src="https://i.cetsteam.com/imgs/2026/03/31/8944c3db6fc0f30d.png" class="pay-img">
            <br>
            <button class="btn" onclick="getCode(2)">已支付，获取卡密</button>
        </div>
        <div class="code" id="code2"></div>
    </div>

    <div class="box">
        <h3>月卡</h3>
        <p>价格：15元</p >
        <button class="btn" onclick="showPay(3)">立即购买</button>
        <div class="pay" id="pay3">
            <p>请扫码支付 10元</p >
            <img src="https://i.cetsteam.com/imgs/2026/03/31/69fea76e08d129bc.png" class="pay-img">
            <br>
            <button class="btn" onclick="getCode(3)">已支付，获取卡密</button>
        </div>
        <div class="code" id="code3"></div>
    </div>

    <div class="box">
        <h3>不知道放什么</h3>
        <p>价格：25元</p >
        <button class="btn" onclick="showPay(4)">立即购买</button>
        <div class="pay" id="pay4">
            <p>请扫码支付 25元</p >
            <img src="https://i.cetsteam.com/imgs/2026/03/31/eb09fadb06d42070.png" class="pay-img">
            <br>
            <button class="btn" onclick="getCode(4)">已支付，获取卡密</button>
        </div>
        <div class="code" id="code4"></div>
    </div>

    <div class="box">
        <h3>不知道放什么</h3>
        <p>价格：30元</p >
        <button class="btn" onclick="showPay(5)">立即购买</button>
        <div class="pay" id="pay5">
            <p>请扫码支付 30元</p >
            <img src="https://i.cetsteam.com/imgs/2026/03/31/f8b34d3adbfdf38f.png" class="pay-img">
            <br>
            <button class="btn" onclick="getCode(5)">已支付，获取卡密</button>
        </div>
        <div class="code" id="code5"></div>
    </div>
</div>

<script>
function showPay(id){
    document.getElementById('pay'+id).style.display="block";
}

function getCode(id){
    alert("支付成功请截图\n联系QQ：3608504926 领取卡密");
}
</script>
</body>
</html>
