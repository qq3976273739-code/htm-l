<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>虎天寿发卡</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:微软雅黑,sans-serif;
}
html,body{
    height:100%;
    width:100%;
}

/* 主页面视频背景 */
.video-bg{
    position:fixed;
    left:0;top:0;
    width:100vw;
    height:100vh;
    z-index:-1;
    object-fit:cover;
}

/* 欢迎页背景 */
.welcome{
    position:fixed;
    width:100%;
    height:100%;
    left:0;
    top:0;
    z-index:999;
    background:url("https://i.cetsteam.com/imgs/2026/04/02/1ce36e88ba086cef.jpg") no-repeat center center fixed;
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    padding:0 20px;
}
.welcome h1{
    color:#fff;
    font-size:42px;
    margin-bottom:20px;
    text-shadow:0 0 10px #000;
}
.enter-btn{
    background:#2d8cf0;
    color:#fff;
    border:none;
    padding:15px 40px;
    font-size:20px;
    border-radius:12px;
    cursor:pointer;
    margin-top:20px;
    transition:all 0.3s;
}
.enter-btn:hover{
    background:#1b76d0;
    transform:scale(1.05);
}
.welcome-disclaimer{
    background:rgba(0,0,0,0.7);
    padding:15px;
    border-radius:10px;
    max-width:500px;
    color:#fff;
    font-size:12px;
    line-height:1.5;
    text-align:center;
    border:1px solid rgba(255,255,255,0.2);
}
.welcome-disclaimer strong{
    color:#ff4d4f;
}

.loading{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    color:#fff;
    font-size:18px;
    flex-direction:column;
    gap:20px;
    text-shadow:0 0 10px #000;
}
.spin{
    width:40px;
    height:40px;
    border:4px solid #2d8cf0;
    border-top:4px solid transparent;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

body{
    color:#fff;
}
.top-name{
    position:fixed;
    top:20px;
    left:30px;
    font-size:28px;
    font-weight:bold;
    text-shadow:0 0 10px #000;
    z-index:10;
}
.container{
    max-width:800px;
    margin:100px auto;
    padding:0 20px;
    position:relative;
    z-index:10;
}
.box{
    background:rgba(0,0,0,0.7);
    padding:30px;
    border-radius:16px;
    margin-bottom:20px;
}
.btn{
    background:#2d8cf0;
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}
.pay,.code{
    display:none;
    margin-top:15px;
}
.code{
    background:#111;
    color:#0f0;
    padding:15px;
    border-radius:8px;
    font-size:16px;
}
.pay-img{
    max-width:220px;
    border-radius:10px;
    margin-top:10px;
}
h1{
    text-align:center;
    margin-bottom:30px;
}
h3{
    margin-bottom:10px;
}
p{
    margin-bottom:10px;
}
.disclaimer{
    background:rgba(0,0,0,0.8);
    padding:20px;
    border-radius:12px;
    margin:30px auto;
    max-width:800px;
    font-size:14px;
    line-height:1.6;
    text-align:center;
    border:1px solid rgba(255,255,255,0.2);
}
.disclaimer strong{
    color:#ff4d4f;
}

.admin-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#222;
    color:#fff;
    padding:10px 16px;
    border-radius:8px;
    border:1px solid #2d8cf0;
    cursor:pointer;
    z-index:99999;
    font-size:14px;
    font-weight:bold;
}

.modal{
    position:fixed;
    left:0;top:0;width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    z-index:999999;
    display:none;
    align-items:center;
    justify-content:center;
}
.modal .box{
    width:90%;
    max-width:500px;
    background:#111;
    padding:25px;
    border-radius:14px;
}
.modal input, .modal textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#222;
    color:#fff;
    border:1px solid #444;
    border-radius:6px;
}
.modal .btn{
    margin-top:10px;
    width:100%;
}
</style>
</head>
<body>

<!-- 主页面视频背景 -->
<video class="video-bg" autoplay muted loop playsinline>
    <source src="https://img.naixiai.cn/2026/04/03/mmexport1775192114753.mp4" type="video/mp4">
</video>

<div class="loading" id="loading">
    <div class="spin"></div>
    <p>正在进入网站...</p >
</div>

<!-- 欢迎页 -->
<div class="welcome" id="welcome">
    <h1>虎天寿发卡</h1>
    <div class="welcome-disclaimer">
        <p><strong>⚠️ 重要声明</strong></p >
        <p>1. 未满十八周岁未成年人禁止购买</p >
        <p>2. 未成年人需监护人同意下购买</p >
        <p>3. 擅自购买后果自负，平台概不负责</p >
        <p>4. 点击进入即视为已阅读并同意本声明</p >
    </div>
    <button class="enter-btn" onclick="enter()">进入发卡网站</button>
</div>

<div class="top-name">虎天寿发卡</div>
<div class="container">
    <div class="disclaimer">
        <p><strong>⚠️ 重要免责声明</strong></p >
        <p>1. 本平台所有卡密商品，<strong>未满十八周岁的未成年人禁止购买</strong>。</p >
        <p>2. 未成年人如确需购买，必须在监护人知情、同意及陪同下进行。</p >
        <p>3. 擅自购买产生的一切纠纷与损失，由购买者及监护人自行承担，平台概不负责。</p >
        <p>4. 点击购买即视为已阅读并同意本声明。</p >
    </div>

    <h1>卡密发卡</h1>
    <div id="goodsArea"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">后台管理</button>

<div class="modal" id="loginModal">
  <div class="box">
    <h3>管理员登录</h3>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button class="btn" onclick="adminLogin()">登录</button>
  </div>
</div>

<div class="modal" id="settingModal">
  <div class="box">
    <h3>网站设置</h3>
    <p>自定义商品（一行一个，格式：名称|价格）：</p >
    <textarea id="goodsList" rows="8" placeholder="例如：
社区小时体验卡|3
社区天卡|5
社区永久卡|10
赞助一下呗|随便
"></textarea>
    <button class="btn" onclick="saveAllConfig()">保存并刷新</button>
  </div>
</div>

<script>
let siteConfig = JSON.parse(localStorage.getItem('hutian_site_config')) || {
  goods: [
    {name: "社区小时体验卡", price: "3元"},
    {name: "社区天卡", price: "5元"},
    {name: "社区永久卡", price: "10元"},
    {name: "赞助一下呗", price: "随便"}
  ]
};

function renderGoods() {
  const goodsArea = document.getElementById('goodsArea');
  goodsArea.innerHTML = '';

  siteConfig.goods.forEach((goods, index) => {
    const goodsHtml = `
    <div class="box">
      <h3>${goods.name}</h3>
      <p>价格：${goods.price}</p >
      <button class="btn" onclick="showPay(${index})">立即购买</button>
      <div class="pay" id="pay${index}">
        <p>请扫码支付 ${goods.price}</p >
        < img src="https://i.cetsteam.com/imgs/2026/04/01/6206ae66c0bf00a8.png" class="pay-img">
        <br>
        <button class="btn" onclick="getCode(${index})">已支付，获取卡密</button>
      </div>
      <div class="code" id="code${index}"></div>
    </div>`;
    goodsArea.innerHTML += goodsHtml;
  });
}

function enter(){
  document.getElementById('loading').style.display = 'flex';
  setTimeout(()=>{
    document.getElementById('loading').style.display = 'none';
    document.getElementById('welcome').style.display='none';
  }, 1200);
}

function showPay(id){
  document.querySelectorAll('.pay').forEach((el,i)=>{
    if(i!=id) el.style.display='none';
  });
  document.getElementById('pay'+id).style.display="block";
}

function getCode(id){
  if(!confirm("请确认您已满18周岁，未成年人禁止购买！")) return;
  alert("支付成功请截图\n联系QQ：3608504926 领取卡密");
}

let isAdminLogin = false;
const ADMIN_PWD = "wangyiming87";

function openAdmin() {
  document.getElementById('loginModal').style.display = 'flex';
  document.getElementById('pwd').value = '';
}

function adminLogin() {
  const pwd = document.getElementById('pwd').value.trim();
  if (pwd === ADMIN_PWD) {
    isAdminLogin = true;
    document.getElementById('loginModal').style.display = 'none';
    
    const goodsText = siteConfig.goods.map(g => `${g.name}|${g.price}`).join('\n');
    document.getElementById('goodsList').value = goodsText;
    document.getElementById('settingModal').style.display = 'flex';
  } else {
    alert('密码错误');
  }
}

function saveAllConfig() {
  if (!isAdminLogin) return;

  const goodsText = document.getElementById('goodsList').value.trim();
  const lines = goodsText.split('\n').filter(l => l.trim());
  siteConfig.goods = lines.map(line => {
    const [name, price] = line.split('|').map(s=>s.trim());
    return { name: name||"商品", price: price||"0元" };
  });

  localStorage.setItem('hutian_site_config', JSON.stringify(siteConfig));
  alert('保存成功！');
  location.reload();
}

renderGoods();
</script>
</body>
</html>
