<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>虎天寿发卡</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:微软雅黑,sans-serif;
}
html,body{
    height:100%;
    width:100%;
}

/* 欢迎页样式（完全原样保留） */
.welcome{
    position:fixed;
    width:100%;
    height:100%;
    left:0;
    top:0;
    z-index:999;
    background:url("https://i.cetsteam.com/imgs/2026/04/01/a93f0949670e30b2.jpg") no-repeat center center fixed;
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    padding:0 20px;
}
.welcome h1{
    color:#fff;
    font-size:42px;
    margin-bottom:20px;
    text-shadow:0 0 10px #000;
}
.enter-btn{
    background:#2d8cf0;
    color:#fff;
    border:none;
    padding:15px 40px;
    font-size:20px;
    border-radius:12px;
    cursor:pointer;
    margin-top:20px;
    transition:all 0.3s;
}
.enter-btn:hover{
    background:#1b76d0;
    transform:scale(1.05);
}
.welcome-disclaimer{
    background:rgba(0,0,0,0.7);
    padding:15px;
    border-radius:10px;
    max-width:500px;
    color:#fff;
    font-size:12px;
    line-height:1.5;
    text-align:center;
    border:1px solid rgba(255,255,255,0.2);
}
.welcome-disclaimer strong{
    color:#ff4d4f;
}

/* 加载动画（完全原样保留） */
.loading{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:transparent;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    color:#fff;
    font-size:18px;
    flex-direction:column;
    gap:20px;
    text-shadow:0 0 10px #000;
}
.spin{
    width:40px;
    height:40px;
    border:4px solid #2d8cf0;
    border-top:4px solid transparent;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

/* 主页面样式（完全原样保留） */
body{
    background:url("https://s41.ax1x.com/2026/03/30/pe8kyA1.jpg") no-repeat center center fixed !important;
    background-size:cover !important;
    background-attachment:fixed !important;
    color:#fff;
}
.top-name{
    position:fixed;
    top:20px;
    left:30px;
    font-size:28px;
    font-weight:bold;
    text-shadow:0 0 10px #000;
    z-index:999;
}
.container{
    max-width:800px;
    margin:100px auto;
    padding:0 20px;
    position:relative;
    z-index:10;
}
.box{
    background:rgba(0,0,0,0.7);
    padding:30px;
    border-radius:16px;
    margin-bottom:20px;
}
.btn{
    background:#2d8cf0;
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}
.pay,.code{
    display:none;
    margin-top:15px;
}
.code{
    background:#111;
    color:#0f0;
    padding:15px;
    border-radius:8px;
    font-size:16px;
}
.pay-img{
    max-width:220px;
    border-radius:10px;
    margin-top:10px;
}
h1{
    text-align:center;
    margin-bottom:30px;
}
h3{
    margin-bottom:10px;
}
p{
    margin-bottom:10px;
}
.disclaimer{
    background:rgba(0,0,0,0.8);
    padding:20px;
    border-radius:12px;
    margin:30px auto;
    max-width:800px;
    font-size:14px;
    line-height:1.6;
    text-align:center;
    border:1px solid rgba(255,255,255,0.2);
}
.disclaimer strong{
    color:#ff4d4f;
}

/* 音乐按钮样式（主页面右上角，层级拉满） */
.music-btn{
    position:fixed;
    top:20px;
    right:20px;
    width:40px;
    height:40px;
    border-radius:50%;
    background:#222;
    color:#fff;
    border:1px solid #2d8cf0;
    cursor:pointer;
    z-index:99999;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* 后台按钮样式（右下角，层级拉满，绝对显示） */
.admin-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#222;
    color:#fff;
    padding:10px 16px;
    border-radius:8px;
    border:1px solid #2d8cf0;
    cursor:pointer;
    z-index:99999;
    font-size:14px;
    font-weight:bold;
}

/* 弹窗样式（层级拉满） */
.modal{
    position:fixed;
    left:0;top:0;width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    z-index:999999;
    display:none;
    align-items:center;
    justify-content:center;
}
.modal .box{
    width:90%;
    max-width:460px;
    background:#111;
    padding:25px;
    border-radius:14px;
}
.modal input{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#222;
    color:#fff;
    border:1px solid #444;
    border-radius:6px;
}
.modal .btn{
    margin-top:10px;
    width:100%;
}
</style>
</head>
<body>

<!-- 音乐标签 -->
<audio id="bgMusic" loop>

<!-- 音乐按钮（主页面显示，欢迎页不显示） -->
<button class="music-btn" onclick="toggleMusic()" id="musicBtn">🎵</button>

<!-- 后台按钮（绝对显示，层级最高） -->
<button class="admin-btn" onclick="openAdmin()">后台管理</button>

<!-- 加载动画 -->
<div class="loading" id="loading">
    <div class="spin"></div>
    <p>正在进入网站...</p >
</div>

<!-- 欢迎页（完全原样保留，没动任何内容） -->
<div class="welcome" id="welcome">
    <h1>虎天寿发卡</h1>
    <div class="welcome-disclaimer">
        <p><strong>⚠️ 重要声明</strong></p >
        <p>1. 未满十八周岁未成年人禁止购买</p >
        <p>2. 未成年人需监护人同意下购买</p >
        <p>3. 擅自购买后果自负，平台概不负责</p >
        <p>4. 点击进入即视为已阅读并同意本声明</p >
    </div>
    <button class="enter-btn" onclick="enter()">进入发卡网站</button>
</div>

<!-- 主页面内容（完全原样保留，没动任何内容） -->
<div class="top-name">虎天寿发卡</div>
<div class="container">
    <div class="disclaimer">
        <p><strong>⚠️ 重要免责声明</strong></p >
        <p>1. 本平台所有卡密商品，<strong>未满十八周岁的未成年人禁止购买</strong>。</p >
        <p>2. 未成年人如确需购买，必须在监护人知情、同意及陪同下进行。</p >
        <p>3. 擅自购买产生的一切纠纷与损失，由购买者及监护人自行承担，平台概不负责。</p >
        <p>4. 点击购买即视为已阅读并同意本声明。</p >
    </div>

    <h1>卡密发卡</h1>

    <div class="box">
        <h3>社区小时体验卡</h3>
        <p>价格：3元</p >
        <button class="btn" onclick="showPay(1)">立即购买</button>
        <div class="pay" id="pay1">
            <p>请扫码支付 3元</p >
            < img src="https://i.cetsteam.com/imgs/2026/03/31/c0bc592857fd8edd.png" class="pay-img">
            <br>
            <button class="btn" onclick="getCode(1)">已支付，获取卡密</button>
        </div>
        <div class="code" id="code1"></div>
    </div>

    <div class="box">
        <h3>社区天卡</h3>
        <p>价格：5元</p >
        <button class="btn" onclick="showPay(2)">立即购买</button>
        <div class="pay" id="pay2">
            <p>请扫码支付 5元</p >
            < img src="https://i.cetsteam.com/imgs/2026/03/31/8944c3db6fc0f30d.png" class="pay-img">
            <br>
            <button class="btn" onclick="getCode(2)">已支付，获取卡密</button>
        </div>
        <div class="code" id="code2"></div>
    </div>

    <div class="box">
        <h3>社区永久卡</h3>
        <p>价格：10元</p >
        <button class="btn" onclick="showPay(3)">立即购买</button>
        <div class="pay" id="pay3">
            <p>请扫码支付 10元</p >
            < img src="https://i.cetsteam.com/imgs/2026/03/31/69fea76e08d129bc.png" class="pay-img">
            <br>
            <button class="btn" onclick="getCode(3)">已支付，获取卡密</button>
        </div>
        <div class="code" id="code3"></div>
    </div>

    <div class="box">
        <h3>安装软件</h3>
        <p>点击下方按钮直接下载安装包</p >
        <a href="" class="btn" style="text-decoration:none;display:inline-block;" target="_blank" download>
            📥 立即下载APK
        </a >
    </div>

    <div class="box">
        <h3>赞助一下呗</h3>
        <p>价格：随便</p >
        <button class="btn" onclick="showPay(5)">立即购买</button>
        <div class="pay" id="pay5">
            <p>请扫码支付</p >
            < img src="https://i.cetsteam.com/imgs/2026/04/01/6206ae66c0bf00a8.png" class="pay-img">
            <br>
            <button class="btn" onclick="getCode(5)">已支付，获取卡密</button>
        </div>
        <div class="code" id="code5"></div>
    </div>
</div>

<!-- 登录弹窗 -->
<div class="modal" id="loginModal">
  <div class="box">
    <h3>管理员登录</h3>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button class="btn" onclick="adminLogin()">登录</button>
  </div>
</div>

<!-- 设置弹窗 -->
<div class="modal" id="settingModal">
  <div class="box">
    <h3>网站设置</h3>
    <p>背景音乐链接（MP3）：</p >
    <input type="text" id="musicUrl" placeholder="填入网络MP3直链">
    <button class="btn" onclick="saveConfig()">保存设置</button>
  </div>
</div>

<script>
// 配置存储
let config = JSON.parse(localStorage.getItem('hutian_music')) || {
  musicUrl: ""
};

// 应用音乐
function applyMusic() {
  const au = document.getElementById('bgMusic');
  if (config.musicUrl) {
    au.src = config.musicUrl;
  }
}

// 音乐播放/暂停切换
function toggleMusic() {
  const au = document.getElementById('bgMusic');
  const btn = document.getElementById('musicBtn');
  if (au.paused) {
    au.play();
    btn.textContent = "⏸️";
  } else {
    au.pause();
    btn.textContent = "🎵";
  }
}

// 原有逻辑（完全没动）
function enter(){
  document.getElementById('loading').style.display = 'flex';
  setTimeout(()=>{
    document.getElementById('loading').style.display = 'none';
    document.getElementById('welcome').style.display='none';
  }, 3000);
}
function showPay(id){
  document.getElementById('pay'+id).style.display="block";
}
function getCode(id){
  if(!confirm("确认已满18周岁？")) return;
  alert("支付成功请截图\n联系QQ：3608504926 领取卡密");
}

// 后台逻辑
let isAdmin = false;
const PWD = "wangyiming87";

function openAdmin() {
  document.getElementById('loginModal').style.display = 'flex';
}
function adminLogin() {
  const pwdInput = document.getElementById('pwd');
  if (pwdInput.value === PWD) {
    isAdmin = true;
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('musicUrl').value = config.musicUrl || '';
    document.getElementById('settingModal').style.display = 'flex';
  } else {
    alert('密码错误');
  }
}
function saveConfig() {
  if (!isAdmin) return;
  config.musicUrl = document.getElementById('musicUrl').value.trim();
  localStorage.setItem('hutian_music', JSON.stringify(config));
  applyMusic();
  alert('保存成功！');
  document.getElementById('settingModal').style.display = 'none';
}

// 初始化
applyMusic();
</script>
</body>
</html>
