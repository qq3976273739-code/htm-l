<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>虎天寿发卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 微软雅黑, sans-serif;
        }

        body {
            background: url('https://i.imgur.com/23C9uNm.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
        }

        .top-name {
            position: fixed;
            top: 20px;
            left: 30px;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px #000;
        }

        .container {
            max-width: 800px;
            margin: 100px auto;
            padding: 0 20px;
        }

        .box {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .btn {
            background: #2d8cf0;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        .pay, .code {
            display: none;
            margin-top: 15px;
        }

        .code {
            background: #111;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
        }

        .pay-img {
            max-width: 220px;
            border-radius: 10px;
            margin-top: 10px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        h3 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="top-name">虎天寿发卡</div>
    <div class="container">
        <h1>四叶草发卡中心</h1>

        <!-- 商品1 -->
        <div class="box">
            <h3>普通发卡</h3>
            <p>价格：5元</p >
            <button class="btn" onclick="showPay(1)">立即购买</button>
            <div class="pay" id="pay1">
                <p>请扫码支付 5元</p >
                < img src="https://i.imgur.com/E6WlpW2.png">
                <br>
                <button class="btn" onclick="getCode(1)">已支付，获取卡密</button>
            </div>
            <div class="code" id="code1"></div>
        </div>

        <!-- 商品2 -->
        <div class="box">
            <h3>高级发卡</h3>
            <p>价格：15元</p >
            <button class="btn" onclick="showPay(2)">立即购买</button>
            <div class="pay" id="pay2">
                <p>请扫码支付 15元</p >
                < img src="https://i.imgur.com/E6WlpW2.png">
                <br>
                <button class="btn" onclick="getCode(2)">已支付，获取卡密</button>
            </div>
            <div class="code" id="code2"></div>
        </div>

        <!-- 商品3 -->
        <div class="box">
            <h3>批量发卡</h3>
            <p>价格：30元</p >
            <button class="btn" onclick="showPay(3)">立即购买</button>
            <div class="pay" id="pay3">
                <p>请扫码支付 30元</p >
                < img src="https://i.imgur.com/E6WlpW2.png">
                <br>
                <button class="btn" onclick="getCode(3)">已支付，获取卡密</button>
            </div>
            <div class="code" id="code3"></div>
        </div>
    </div>

    <script>
        // 模拟卡密库（前端演示用）
        const codes = {
            1: ["10001-ABCDE", "10002-BCDEF", "10003-CDEFG", "10004-DEFGH"],
            2: ["VIP001-AABBCC", "VIP002-BBCCDD", "VIP003-CCDDEE"],
            3: ["PL001-112233", "PL002-223344", "PL003-334455"]
        };

        const used = {};

        function showPay(id) {
            document.getElementById('pay' + id).style.display = 'block';
        }

        function getCode(id) {
            if (!codes[id] || codes[id].length === 0) {
                document.getElementById('code' + id).innerText = "卡密：已售罄";
                document.getElementById('code' + id).style.display = 'block';
                return;
            }
            const code = codes[id].shift();
            document.getElementById('code' + id).innerText = "卡密：" + code;
            document.getElementById('code' + id).style.display = 'block';
        }
    </script>
</body>
</html>
