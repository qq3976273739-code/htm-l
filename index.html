<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虎天寿发卡网</title>
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面核心样式：背景图 + 全屏居中 */
        body {
            width: 100vw;
            height: 100vh;
            /* 背景图链接（可替换） */
            background: url("https://i.imgur.com/23C9uNm.jpeg") center/cover no-repeat fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            text-shadow: 0 0 12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        /* 中间大字样式 */
        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* 收款码样式 */
        .qrcode {
            width: 240px;
            height: 240px;
            border-radius: 16px;
            border: 5px solid #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 50px;
            object-fit: cover;
        }

        /* 商品卡片样式 */
        .product-card {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px 40px;
            border-radius: 12px;
            margin: 15px 0;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .product-price {
            font-size: 22px;
            margin-bottom: 15px;
        }

        /* 购买按钮样式 */
        .buy-btn {
            padding: 14px 35px;
            background: #00a1ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer; /* 确保是手型 */
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 161, 255, 0.4);
        }

        .buy-btn:hover {
            background: #0086d9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 161, 255, 0.6);
        }

        .buy-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="title">四叶草</div>

    <!-- 👇 这里改收款码：把 link 换成你自己的图床链接 -->
    < img class="qrcode" src="https://i.imgur.com/E6WlpW2.png" alt="收款码">

    <div class="product-card">
        <div class="product-price">普通卡密 · 5 元</div>
        <button class="buy-btn" onclick="alert('普通卡密购买功能开发中~')">立即购买</button>
    </div>

    <div class="product-card">
        <div class="product-price">高级卡密 · 15 元</div>
        <button class="buy-btn" onclick="alert('高级卡密购买功能开发中~')">立即购买</button>
    </div>
</body>
</html>
